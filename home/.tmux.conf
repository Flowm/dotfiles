####################
#  Global Options
####################
# Terminal
set -g default-terminal "screen-256color"

# Start window/pane index at 1 for better keyboard alignment
set -g base-index 1
set -g pane-base-index 1

# Longer history
set -g history-limit 262144

# Don't lose track of SSH_AGENT etc. from parent environment
set -g update-environment -r
setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock

# Mouse integration
set -g mouse on

# Send focus events
set -g focus-events on

# Increase tmux messages display duration from 750ms to 2s
set -g display-time 2000

# Let tmux recognize Shift+Enter from iTerm2, then forward as CSI u bytes
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind -n S-Enter send-keys -H 1b 5b 31 33 3b 32 75

####################
# Appearance
####################
# Title bar
set -g set-titles on
set -g set-titles-string '#h:#S:#W #I.#P'

# Status bar
set -g status-style bg=black,fg=white
set -g window-status-current-style bg=red
set -g status-left-length 15
set -g status-left '#[fg=green]#h#[fg=green]:#[fg=white]#S#[fg=green] | '
set -g status-right '%d.%m.%Y %H:%M '

# Resize windows to the size of the last active client
set -g window-size latest

####################
# Key Bindings
####################
# Use vi bindings
set -wg mode-keys vi
set -wg status-keys vi

# Prefix passthrough for nested sessions
bind -n C-s send-prefix

# Synchronize input across all panes in a window
bind y set -w synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Reload config
bind R source-file ~/.tmux.conf

# Save pane scrollback to file
bind P command-prompt -I "~/.tmux.history" -p "Store current pane contents to file:" "capture-pane -b temp-capture-buffer -S -; save-buffer -b temp-capture-buffer %1; delete-buffer -b temp-capture-buffer"

# Kill session
bind X confirm-before kill-session

# Window and pane management while preserving current path
bind c new-window -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation and reordering
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-j swap-window -t -1 \; previous-window
bind -r C-k swap-window -t +1 \; next-window
